<body class="bg-background min-h-screen flex flex-col items-center justify-center p-margin-mobile md:p-margin-desktop text-on-background font-body-md">

<p class="font-data-sm text-data-sm uppercase text-text-muted mt-1">Citizen Services Portal</p>

<!-- State 1: Login Form -->
<div class="block" id="view-login">

<!-- Dropdown -->
<div><label class="block font-data-sm text-label-sm uppercase text-text-muted mb-stack-sm" for="mobile">Mobile Number</label><input autocomplete="tel" class="w-full bg-surface border border-border instrument-input px-3 py-2 text-on-surface font-body-md" id="mobile" placeholder="Enter 10-digit mobile number" type="tel"/></div>
<!-- Username -->
<!-- Password -->

<label class="block font-data-sm text-data-sm uppercase text-text-muted mb-stack-sm" for="password">Account Password</label>
<input autocomplete="current-password" class="w-full bg-surface border border-border instrument-input px-3 py-2 text-on-surface font-body-md" id="password" placeholder="••••••••" type="password"/>
</div>
<!-- Submit Action -->
<div class="mt-2"><button class="w-full bg-primary-container text-on-primary font-label-md text-label-md py-3 rounded-[6px] hover:bg-primary transition-colors active:scale-[0.98] mb-stack-sm" type="submit">Login to Citizen Portal</button><button class="w-full bg-surface border border-border text-primary font-label-md text-label-md py-3 rounded-[6px] hover:bg-surface-container-low transition-colors active:scale-[0.98]" type="button">Register with Aadhaar</button></div>
</form>

<script>
        function toggleView() {
            const loginView = document.getElementById('view-login');
            const rolesView = document.getElementById('view-roles');
            
            if (loginView.classList.contains('block')) {
                // Simulate loading state briefly before showing roles
                const btn = loginView.querySelector('button[type="submit"]');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<span class="material-symbols-outlined animate-spin" style="font-size:18px">sync</span>';
                btn.classList.add('opacity-80', 'pointer-events-none');
                
                setTimeout(() => {
                    loginView.classList.replace('block', 'hidden');
                    rolesView.classList.replace('hidden', 'block');
                    btn.innerHTML = originalText;
                    btn.classList.remove('opacity-80', 'pointer-events-none');
                }, 600);
            } else {
                rolesView.classList.replace('block', 'hidden');
                loginView.classList.replace('hidden', 'block');
            }
        }
    </script>
