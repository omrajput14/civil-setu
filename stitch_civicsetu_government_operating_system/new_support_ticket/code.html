<body class="bg-background min-h-screen text-on-surface flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface text-primary dark:text-on-primary-fixed font-headline-md text-headline-md fixed top-0 w-full z-50 border-b border-border dark:border-outline shadow-[0_1px_2px_rgba(17,24,39,0.06)] flex justify-between items-center h-rail-height px-margin-desktop md:h-16 h-14" style="height: 64px;">
<div class="flex items-center gap-4">
<button class="hover:bg-surface-container-low transition-colors active:opacity-80 transition-opacity p-2 rounded-none flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed m-0 leading-none">New Support Ticket</h1>
</div>
<div class="hidden md:flex gap-4 items-center">
<!-- Top Nav logic hidden as this is a transactional flow -->
</div>
</header>
<!-- Main Content -->
<main class="flex-grow flex justify-center items-start pt-[80px] pb-rail-height px-margin-mobile md:px-margin-desktop">
<div class="w-full max-w-2xl bg-surface border border-border shadow-[0_1px_2px_rgba(17,24,39,0.06)] flex flex-col p-6 md:p-8 rounded-none">
<form class="flex flex-col gap-stack-lg w-full">
<!-- Category -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-md text-label-md text-on-surface" for="category">Issue Category</label>
<div class="relative">
<select class="w-full h-12 bg-surface border border-border rounded-none px-4 appearance-none focus:outline-none focus:border-primary focus:border-2 font-body-md text-body-md text-on-surface cursor-pointer" id="category">
<option disabled="" selected="" value="">Select category</option>
<option value="network">Network Connectivity</option>
<option value="hardware">Hardware Failure</option>
<option value="software">Software Bug</option>
<option value="access">Access Control</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-text-muted">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Service ID -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-md text-label-md text-on-surface flex justify-between" for="service-id">
                        Service ID 
                        <span class="font-data-sm text-data-sm text-text-muted uppercase">Optional</span>
</label>
<input class="w-full h-12 bg-surface border border-border rounded-none px-4 focus:outline-none focus:border-primary focus:border-2 font-data-md text-data-md text-on-surface uppercase placeholder:text-text-muted placeholder:normal-case placeholder:font-body-md" id="service-id" placeholder="e.g., SRV-10294" type="text"/>
</div>
<!-- Describe Issue -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-md text-label-md text-on-surface" for="description">Describe your Issue</label>
<textarea class="w-full bg-surface border border-border rounded-none p-4 focus:outline-none focus:border-primary focus:border-2 font-body-md text-body-md text-on-surface resize-y placeholder:text-text-muted" id="description" placeholder="Provide a detailed description of the problem..." rows="5"></textarea>
</div>
<!-- Upload Attachment -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-md text-label-md text-on-surface">Upload Attachment</label>
<div class="w-full h-32 border border-dashed border-border flex flex-col items-center justify-center gap-2 cursor-pointer hover:bg-surface-container-low transition-colors group">
<span class="material-symbols-outlined text-text-muted group-hover:text-primary transition-colors text-3xl">upload_file</span>
<span class="font-body-md text-body-md text-text-muted group-hover:text-primary transition-colors">Click to upload or drag files here</span>
<input class="hidden" id="file-upload" type="file"/>
</div>
</div>
<!-- Action -->
<div class="pt-stack-md flex justify-end">
<button class="bg-primary-container text-on-primary rounded-none h-12 px-6 font-label-md text-label-md uppercase tracking-wider hover:bg-primary transition-colors active:opacity-80 flex items-center justify-center" type="submit">
                        Submit Support Request
                    </button>
</div>
</form>
</div>
</main>
<!-- Technical Metadata Rail -->
<footer class="fixed bottom-0 w-full h-rail-height bg-surface border-t border-border z-50 flex items-center px-margin-mobile md:px-margin-desktop justify-between shadow-[0_-1px_2px_rgba(17,24,39,0.06)]">
<div class="flex items-center gap-6 overflow-x-auto whitespace-nowrap scrollbar-hide w-full">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[14px] text-text-muted">memory</span>
<span class="font-data-sm text-data-sm uppercase text-text-muted">DEVICE ID: CS-9928</span>
</div>
<div class="w-px h-4 bg-border hidden sm:block"></div>
<div class="flex items-center gap-2 hidden sm:flex">
<span class="material-symbols-outlined text-[14px] text-text-muted">terminal</span>
<span class="font-data-sm text-data-sm uppercase text-text-muted">OS VERSION: 2.4.1-STABLE</span>
</div>
<div class="w-px h-4 bg-border hidden md:block"></div>
<div class="flex items-center gap-2 ml-auto">
<span class="material-symbols-outlined text-[14px] text-warning">priority_high</span>
<span class="font-data-sm text-data-sm uppercase text-text-muted">TICKET PRIORITY: AUTOMATIC</span>
</div>
</div>
</footer>
<style>
        .scrollbar-hide::-webkit-scrollbar {

        }

            -ms-overflow-style: none;
            scrollbar-width: none;
