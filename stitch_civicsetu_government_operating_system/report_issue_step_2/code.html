<span class="material-symbols-outlined text-[24px]">chevron_left</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary tracking-tight">Report Issue</h1>
<button class="text-on-surface-variant hover:bg-surface-container-low transition-colors p-2 -mr-2 rounded-sys active:scale-95 flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" type="button">
<span class="material-symbols-outlined text-[24px]">close</span>
</button>
</header>
<!-- Status Rail / Progress -->
<div class="h-rail-height bg-surface border-b border-border flex items-center px-margin-mobile gap-4 shrink-0 z-10 relative">
<div class="font-data-sm text-data-sm text-text-muted uppercase tracking-widest w-24 shrink-0">STEP 2 OF 3</div>
<div aria-valuemax="3" aria-valuemin="1" aria-valuenow="2" class="flex-1 flex gap-1 h-1.5" role="progressbar">
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-surface-variant rounded-full"></div>
</div>
</div>
<!-- Scrollable Content Canvas -->
<main class="flex-1 overflow-y-auto px-margin-mobile py-stack-lg flex flex-col gap-stack-lg pb-32">
<!-- Section 1: Capture/Upload Photo -->
<section class="bg-surface border border-border rounded-sys p-4 flex flex-col gap-3 shadow-[0_1px_2px_rgba(17,24,39,0.06)]">
<div class="flex flex-col gap-1">
<h2 class="font-label-md text-label-md text-primary">Capture/Upload Photo</h2>
<p class="font-body-md text-[14px] leading-[20px] text-text-muted">Evidence required for verification</p>
</div>
<button class="w-full border-2 border-dashed border-outline-variant hover:border-primary rounded-sys bg-surface-bright h-36 flex flex-col items-center justify-center gap-2 cursor-pointer transition-all group focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" type="button">
<div class="w-12 h-12 bg-surface-container-low group-hover:bg-primary-container/10 rounded-full flex items-center justify-center transition-colors">
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors text-2xl">add_a_photo</span>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant group-hover:text-primary transition-colors">Tap to select or capture</span>
</button>
</section>
<!-- Section 2: Identify Location -->

<h2 class="font-label-md text-label-md text-primary">Identify Location</h2>
<!-- Map Viewport -->
<div class="relative w-full h-48 border border-border rounded-sys overflow-hidden bg-surface-variant isolate">
<div class="absolute inset-0 bg-cover bg-center opacity-90" data-alt="A clean, modern top-down satellite map view of a rural administrative area. The map style is light mode, high contrast, using a restricted corporate color palette of soft whites, pale cool grays, and muted earth tones. The UI aesthetic is professional, strictly functional, and geometric, resembling an industrial GIS instrument panel. The map displays a grid of sparse dirt roads and small structures, evenly illuminated." data-location="Ward 4, Rural District" style="background-image: url('https://www.gstatic.com/labs-code/stitch/stitch-placeholder-300x300.svg')"></div>
<!-- Center Pin Overlay -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none z-10">
<div class="relative -top-3">
<span class="material-symbols-outlined text-danger text-4xl drop-shadow-md" style="font-variation-settings: 'FILL' 1;">location_on</span>
<div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-2 h-1 bg-black/20 blur-[2px] rounded-[100%]"></div>
</div>
</div>

<div class="absolute bottom-2 right-2 flex flex-col gap-1 z-10">

<span class="material-symbols-outlined text-[18px]">add</span>
</div>
<div class="w-8 h-8 bg-surface border border-border rounded-sys shadow-sm flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[18px]">remove</span>
</div>
</div>
</div>

<div class="bg-surface-bright border border-border rounded-sys p-3 flex items-start gap-3">
<span class="material-symbols-outlined text-outline-variant mt-0.5">my_location</span>
<div class="flex flex-col gap-1">
<span class="font-data-sm text-data-sm text-text-muted uppercase">Current Location Auto-detected</span>
<span class="font-data-md text-data-md text-primary tracking-tight">GPS: 28.6139° N, 77.2090° E</span>
</div>
</div>

<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant text-[20px]">signpost</span>

</div>
</div>
