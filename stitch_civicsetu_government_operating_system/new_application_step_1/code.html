</div>

<div>

</div>

</div>
</button>
<!-- Selected Row: Income -->
<button class="flex items-center justify-between w-full p-4 bg-surface border-2 border-primary rounded-DEFAULT shadow-elevation text-left relative overflow-hidden">

<div class="flex flex-col gap-1 pl-2">
<span class="font-label-md text-label-md text-on-surface font-bold">Income Certificate</span>

</div>
<div class="w-5 h-5 rounded-full border-2 border-primary flex items-center justify-center">
<div class="w-2.5 h-2.5 rounded-full bg-primary"></div>
</div>
</button>
