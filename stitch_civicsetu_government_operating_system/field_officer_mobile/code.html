<span class="material-symbols-outlined">menu</span>
</button>
<div class="flex items-center gap-2">
<h1 class="font-headline-md text-headline-md text-primary font-semibold">My Tasks</h1>
<span class="font-data-md text-data-md bg-surface-variant text-primary px-2 py-0.5 rounded-full border border-border">5</span>
</div>
<button class="text-primary hover:text-primary-container transition-colors flex items-center justify-center p-1">
<span class="material-symbols-outlined">my_location</span>
</button>
</div>
<!-- Bottom Drawer Canvas -->
<div class="absolute bottom-[60px] w-full h-[530px] bg-surface z-30 rounded-t-[16px] shadow-[0_-4px_12px_rgba(17,24,39,0.08)] border-t border-border flex flex-col">
<!-- Handle -->
<div class="w-10 h-1.5 bg-outline-variant rounded-full mx-auto mt-3 mb-1"></div>
<!-- Drawer Content Area -->
<div class="flex-1 overflow-y-auto px-margin-mobile py-stack-md flex flex-col gap-stack-lg">
<!-- Header -->
<div>
<h2 class="font-headline-md text-headline-md text-primary font-bold">Borewell <span class="font-data-lg text-data-lg text-primary">#12</span> — Ward 4</h2>
<p class="font-label-sm text-label-sm text-text-muted mt-1 uppercase tracking-wider">Asset Inspection</p>
</div>
<!-- Segmented Control -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-sm text-label-sm text-text-muted uppercase tracking-wider">Condition</label>
<div class="flex w-full border border-border rounded overflow-hidden">
<button class="flex-1 py-2 font-label-md text-label-md bg-surface text-on-surface-variant border-r border-border hover:bg-surface-bright transition-colors">Good</button>
<button class="flex-1 py-2 font-label-md text-label-md bg-surface-variant text-on-surface font-bold border-r border-border">Fair</button>
<button class="flex-1 py-2 font-label-md text-label-md bg-surface text-on-surface-variant hover:bg-surface-bright transition-colors">Poor</button>
</div>
</div>

<label class="font-label-sm text-label-sm text-text-muted uppercase tracking-wider">Notes</label>
<textarea class="w-full h-24 border border-border rounded p-2 font-body-md text-body-md bg-surface text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent resize-none" placeholder="Enter observation details..."></textarea>
</div>

<span class="material-symbols-outlined">add_a_photo</span>
<span class="font-label-md text-label-md">Add Photo</span>
</button>

<button class="w-full bg-warning text-on-primary py-3 rounded font-label-md text-label-md font-bold uppercase tracking-wider flex justify-center items-center gap-2 shadow-[0_1px_2px_rgba(17,24,39,0.06)] active:scale-[0.98] transition-transform">
