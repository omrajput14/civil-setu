            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<!-- TopAppBar Component (Transactional/Focused Task - Hide Global Nav) -->
<header class="bg-surface w-full top-0 border-b border-border shadow-sm flex justify-between items-center px-margin-mobile md:px-margin-desktop py-4 z-50">
<div class="flex items-center gap-4">
<!-- No leading icon specified in prompt for this state, but structure exists -->
</div>
<h1 class="font-headline-md text-headline-md font-bold text-primary tracking-tight">Report Issue</h1>
<button aria-label="Close" class="text-on-surface-variant hover:bg-surface-container-low transition-colors duration-200 p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow w-full max-w-3xl mx-auto px-margin-mobile md:px-margin-desktop py-8 flex flex-col gap-stack-lg">
<!-- Progress Module -->
<div class="w-full flex flex-col gap-stack-sm">
<div class="flex justify-between items-center">
<span class="font-data-sm text-data-sm text-text-muted uppercase tracking-wider">STEP 1 OF 3</span>
</div>
<!-- Progress Bar -->
<div class="w-full flex gap-2 h-2 rounded-full overflow-hidden bg-surface border border-border shadow-[0_1px_2px_rgba(17,24,39,0.06)] p-0.5">
<div class="h-full bg-primary flex-1 rounded-sm"></div>
<div class="h-full bg-surface-variant flex-1 rounded-sm"></div>
<div class="h-full bg-surface-variant flex-1 rounded-sm"></div>
</div>
</div>
<!-- Section Title -->
<h2 class="font-headline-lg text-headline-lg text-on-surface">Select Category</h2>
<!-- Selection Form -->
<form class="flex flex-col gap-stack-md flex-grow">
<!-- Option 1 -->
<label class="group relative flex items-start gap-4 p-4 bg-surface border border-border rounded-lg cursor-pointer hover:bg-surface-container-lowest transition-colors shadow-[0_1px_2px_rgba(17,24,39,0.06)]">
<input class="mt-1 shrink-0 w-5 h-5 text-primary focus:ring-primary border-outline" name="issue_category" type="radio" value="water"/>
<div class="flex flex-col">
<span class="font-label-md text-label-md text-on-surface">Water &amp; Sanitation</span>
<span class="font-body-md text-body-md text-text-muted">Leaks, drainage, waste collection</span>
</div>
</label>
<!-- Option 2 (Selected State) -->
<label class="group relative flex items-start gap-4 p-4 bg-surface border-2 border-primary rounded-lg cursor-pointer shadow-[0_1px_2px_rgba(17,24,39,0.06)] overflow-hidden">
<!-- Saffron Left Accent -->
<div class="absolute left-0 top-0 bottom-0 w-[3px] bg-warning"></div>
<input checked="" class="mt-1 shrink-0 w-5 h-5 text-primary focus:ring-primary border-primary" name="issue_category" type="radio" value="electricity"/>
<div class="flex flex-col pl-2">
<span class="font-label-md text-label-md text-on-surface font-semibold">Electricity</span>
<span class="font-body-md text-body-md text-text-muted">Street lights, power outages</span>
</div>
</label>
<!-- Option 3 -->
<label class="group relative flex items-start gap-4 p-4 bg-surface border border-border rounded-lg cursor-pointer hover:bg-surface-container-lowest transition-colors shadow-[0_1px_2px_rgba(17,24,39,0.06)]">
<input class="mt-1 shrink-0 w-5 h-5 text-primary focus:ring-primary border-outline" name="issue_category" type="radio" value="roads"/>
<div class="flex flex-col">
<span class="font-label-md text-label-md text-on-surface">Roads &amp; Infrastructure</span>
<span class="font-body-md text-body-md text-text-muted">Potholes, broken footpaths</span>
</div>
</label>
<!-- Option 4 -->
<label class="group relative flex items-start gap-4 p-4 bg-surface border border-border rounded-lg cursor-pointer hover:bg-surface-container-lowest transition-colors shadow-[0_1px_2px_rgba(17,24,39,0.06)]">
<input class="mt-1 shrink-0 w-5 h-5 text-primary focus:ring-primary border-outline" name="issue_category" type="radio" value="health"/>
<div class="flex flex-col">
<span class="font-label-md text-label-md text-on-surface">Public Health</span>
<span class="font-body-md text-body-md text-text-muted">Cleanliness, vector control</span>
</div>
</label>
<!-- Option 5 -->
<label class="group relative flex items-start gap-4 p-4 bg-surface border border-border rounded-lg cursor-pointer hover:bg-surface-container-lowest transition-colors shadow-[0_1px_2px_rgba(17,24,39,0.06)]">
<input class="mt-1 shrink-0 w-5 h-5 text-primary focus:ring-primary border-outline" name="issue_category" type="radio" value="other"/>
<div class="flex flex-col">
<span class="font-label-md text-label-md text-on-surface">Other</span>
<span class="font-body-md text-body-md text-text-muted">General issues</span>
</div>
</label>
</form>
</main>
<!-- Bottom Action Area -->
<div class="w-full bg-surface border-t border-border p-4 mt-auto">
<div class="w-full max-w-3xl mx-auto flex">
<button class="w-full bg-primary-container text-on-primary font-label-md text-label-md font-bold py-3 px-6 rounded-DEFAULT hover:bg-primary transition-colors flex justify-center items-center gap-2 shadow-[0_1px_2px_rgba(17,24,39,0.06)]" type="button">
                Continue
                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
